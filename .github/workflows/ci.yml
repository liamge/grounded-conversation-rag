name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" mypy

      - name: Lint
        run: ruff check .

      - name: Import checks
        run: ruff check --select I .

      - name: Type check
        run: mypy src tests --ignore-missing-imports

      - name: Unit tests
        env:
          RAG_DISABLE_DENSE: "1"
        run: pytest

      - name: CLI smoke test
        env:
          RAG_DISABLE_DENSE: "1"
        run: python scripts/smoke_generate.py
