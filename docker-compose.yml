version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - RAG_DISABLE_DENSE=${RAG_DISABLE_DENSE:-}
    deploy:
      resources:
        limits:
          memory: 4g
    # Increase shared memory to avoid OpenMP issues with sentence-transformers
    shm_size: "1g"
